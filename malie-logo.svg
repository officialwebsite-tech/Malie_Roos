<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Malie Roos logo — globe with initials MR</title>
  <circle cx="100" cy="100" r="92" fill="#16213E"/>
  <circle cx="100" cy="100" r="92" fill="none" stroke="#E3A857" stroke-width="2"/>

  <g fill="none" stroke="#E3A857" stroke-width="1.1" opacity="0.85">
    <circle cx="100" cy="100" r="70"/>
    <ellipse cx="100" cy="100" rx="28" ry="70"/>
    <ellipse cx="100" cy="100" rx="70" ry="28"/>
    <path d="M 30,100 A 70,70 0 0,1 170,100"/>
    <path d="M 30,100 A 70,70 0 0,0 170,100"/>
    <line x1="30" y1="100" x2="170" y2="100"/>
  </g>

  <text x="100" y="92" text-anchor="middle"
        font-family="'Fraunces', Georgia, serif" font-size="32"
        font-weight="600" letter-spacing="1" fill="#F3ECDA">
    <tspan x="100" dy="0">MALIE</tspan>
    <tspan x="100" dy="38">ROOS</tspan>
  </text>
</svg>
